
<style>
* { box-sizing: border-box; }
#wrap { width:100%; height:620px; overflow:hidden; cursor:grab; user-select:none; background:var(--color-background-secondary); border-radius:var(--border-radius-lg); position:relative; }
#wrap:active { cursor:grabbing; }
#canvas { position:absolute; top:0; left:0; transform-origin:0 0; }
.tbl { position:absolute; border-radius:8px; font-family:var(--font-sans); font-size:12px; min-width:140px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.tbl-head { padding:6px 10px; border-radius:8px 8px 0 0; font-weight:500; font-size:12px; }
.tbl-body { border-radius:0 0 8px 8px; overflow:hidden; }
.tbl-row { padding:3px 10px; font-size:11px; display:flex; gap:6px; align-items:center; }
.tbl-row:last-child { border-radius:0 0 8px 8px; }
.badge { font-size:9px; padding:1px 4px; border-radius:3px; font-weight:500; flex-shrink:0; }
.controls { position:absolute; bottom:10px; right:10px; display:flex; gap:6px; z-index:10; }
.ctrl-btn { background:var(--color-background-primary); border:1px solid var(--color-border-secondary); color:var(--color-text-primary); border-radius:6px; width:30px; height:30px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ctrl-btn:hover { background:var(--color-background-secondary); }
.legend { position:absolute; top:10px; left:10px; background:var(--color-background-primary); border:1px solid var(--color-border-tertiary); border-radius:8px; padding:8px 10px; font-size:11px; color:var(--color-text-secondary); z-index:10; }
.leg-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.leg-row:last-child { margin-bottom:0; }
.leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
svg#lines { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
</style>

<div id="wrap">
  <div id="canvas">
    <svg id="lines" width="1600" height="1500"></svg>
  </div>
  <div class="legend">
    <div class="leg-row"><div class="leg-dot" style="background:#534AB7"></div> Server infrastructure</div>
    <div class="leg-row"><div class="leg-dot" style="background:#0F6E56"></div> SQL layer</div>
    <div class="leg-row"><div class="leg-dot" style="background:#185FA5"></div> Contacts & BUs</div>
    <div class="leg-row"><div class="leg-dot" style="background:#854F0B"></div> Lookup tables</div>
    <div class="leg-row"><div class="leg-dot" style="background:#993C1D"></div> Monitoring</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="zoom(1.2)" title="Zoom in">+</button>
    <button class="ctrl-btn" onclick="zoom(0.8)" title="Zoom out">−</button>
    <button class="ctrl-btn" onclick="resetView()" title="Reset" style="font-size:12px">⌂</button>
  </div>
</div>

<script>
const COLORS = {
  server:  { head:'#534AB7', headTxt:'#EEEDFE', rowOdd:'#F4F3FD', rowEven:'#EEEDFE', rowTxt:'#26215C', border:'#7F77DD' },
  sql:     { head:'#0F6E56', headTxt:'#E1F5EE', rowOdd:'#EAF7F3', rowEven:'#E1F5EE', rowTxt:'#04342C', border:'#1D9E75' },
  contact: { head:'#185FA5', headTxt:'#E6F1FB', rowOdd:'#EBF4FD', rowEven:'#E6F1FB', rowTxt:'#042C53', border:'#378ADD' },
  lookup:  { head:'#854F0B', headTxt:'#FAEEDA', rowOdd:'#FDF5E8', rowEven:'#FAEEDA', rowTxt:'#412402', border:'#EF9F27' },
  monitor: { head:'#993C1D', headTxt:'#FAECE7', rowOdd:'#FDF0EB', rowEven:'#FAECE7', rowTxt:'#4A1B0C', border:'#D85A30' },
};

const dark = matchMedia('(prefers-color-scheme:dark)').matches;
if (dark) {
  COLORS.server  = { head:'#3C3489', headTxt:'#CECBF6', rowOdd:'#2a2660', rowEven:'#231f55', rowTxt:'#CECBF6', border:'#7F77DD' };
  COLORS.sql     = { head:'#085041', headTxt:'#9FE1CB', rowOdd:'#063d32', rowEven:'#05342a', rowTxt:'#9FE1CB', border:'#1D9E75' };
  COLORS.contact = { head:'#0C447C', headTxt:'#B5D4F4', rowOdd:'#0a3662', rowEven:'#082d52', rowTxt:'#B5D4F4', border:'#378ADD' };
  COLORS.lookup  = { head:'#633806', headTxt:'#FAC775', rowOdd:'#4d2c05', rowEven:'#3f2404', rowTxt:'#FAC775', border:'#EF9F27' };
  COLORS.monitor = { head:'#712B13', headTxt:'#F5C4B3', rowOdd:'#5a2210', rowEven:'#4a1c0d', rowTxt:'#F5C4B3', border:'#D85A30' };
}

const tables = [
  { id:'Server', group:'server', x:380, y:30, cols:[
    ['ServerID','PK'],['ServerName',''],['EnvID','FK'],['BUID','FK'],['CategoryID','FK'],['RegionID','FK'],['StatusID','FK']
  ]},
  { id:'ServerHardware', group:'server', x:30, y:220, cols:[
    ['ServerHardwareID','PK'],['ServerID','FK'],['DomainID','FK'],['OperatingSystemID','FK'],['ServerTypeID','FK'],['PlatformID','FK'],['TimezoneID','FK'],['MemoryGB',''],['CPUCores',''],['IsCurrent','']
  ]},
  { id:'ServerIP', group:'server', x:380, y:220, cols:[
    ['IPID','PK'],['ServerID','FK'],['IPAddress',''],['IPAddressTypeID','FK'],['IsActive','']
  ]},
  { id:'ServerStorage', group:'server', x:640, y:220, cols:[
    ['StorageID','PK'],['ServerID','FK'],['DriveLetter',''],['TotalSizeGB',''],['FreeSpaceGB','']
  ]},
  { id:'ServerContact', group:'server', x:860, y:220, cols:[
    ['ServerID','FK'],['ContactID','FK'],['ContactCategoryID','FK']
  ]},
  { id:'SQLInstance', group:'sql', x:380, y:500, cols:[
    ['SQLInstanceID','PK'],['ServerID','FK'],['InstanceName',''],['InstanceTypeID','FK'],['IsActive','']
  ]},
  { id:'SQLDatabase', group:'sql', x:30, y:700, cols:[
    ['SQLDatabaseID','PK'],['SQLInstanceID','FK'],['DatabaseName',''],['SizeGB',''],['CDC',''],['Encryption',''],['IsActive','']
  ]},
  { id:'SQLInstanceVersion', group:'sql', x:240, y:700, cols:[
    ['SQLInstanceVersionID','PK'],['SQLInstanceID','FK'],['SQLVersionID','FK'],['SQLEditionID','FK'],['ProductBuild',''],['IsCurrent','']
  ]},
  { id:'SQLInstanceConfig', group:'sql', x:470, y:700, cols:[
    ['SQLInstanceConfigID','PK'],['SQLInstanceID','FK'],['InstanceCollationID','FK'],['MaxMemoryMB',''],['MaxDOP',''],['IsCurrent','']
  ]},
  { id:'SQLInstanceLinkedServer', group:'sql', x:680, y:700, cols:[
    ['SQLInstanceID','FK'],['LinkedServerName',''],['IsActive','']
  ]},
  { id:'SQLDatabaseDailySnapshot', group:'sql', x:920, y:700, cols:[
    ['SnapshotDate','PK'],['SQLInstanceID','FK'],['DatabaseName',''],['DataSizeGB',''],['LogSizeGB','']
  ]},
  { id:'SQLDatabaseMonthlyMax', group:'sql', x:1130, y:700, cols:[
    ['YearMonth','PK'],['SQLInstanceID','FK'],['DatabaseName',''],['MaxDataSizeGB',''],['MaxLogSizeGB','']
  ]},
  { id:'DatabaseBackup', group:'monitor', x:1130, y:500, cols:[
    ['DatabaseBackupID','PK'],['SQLInstanceID','FK'],['DatabaseName',''],['BackupType',''],['BackupSizeMB','']
  ]},
  { id:'SQLMaintenanceJobRun', group:'monitor', x:1360, y:500, cols:[
    ['SnapshotDate','PK'],['SQLInstanceID','FK'],['JobName',''],['LastRunDateTime',''],['LastRunStatus','']
  ]},
  { id:'Contact', group:'contact', x:1100, y:220, cols:[
    ['ContactID','PK'],['ContactName',''],['Email',''],['Phone','']
  ]},
  { id:'ContactCategory', group:'contact', x:1100, y:30, cols:[
    ['ContactCategoryID','PK'],['ContactCategoryName','']
  ]},
  { id:'BusinessUnit', group:'contact', x:860, y:30, cols:[
    ['BUID','PK'],['BusinessUnitName','']
  ]},
  { id:'BusinessUnitContact', group:'contact', x:860, y:420, cols:[
    ['BUID','FK'],['ContactID','FK'],['ContactCategoryID','FK']
  ]},
  { id:'ChangeHistory', group:'monitor', x:1360, y:30, cols:[
    ['ChangeID','PK'],['EntityName',''],['RecordID',''],['FieldName',''],['OldValue',''],['NewValue',''],['ChangedBy','']
  ]},
  { id:'AppUser', group:'monitor', x:1360, y:260, cols:[
    ['UserID','PK'],['Username',''],['PasswordHash',''],['UserRole',''],['IsActive','']
  ]},
  { id:'Environment', group:'lookup', x:30, y:30, cols:[['EnvID','PK'],['EnvName','']]},
  { id:'Region', group:'lookup', x:30, y:120, cols:[['RegionID','PK'],['RegionName','']]},
  { id:'ServerCategory', group:'lookup', x:170, y:30, cols:[['CategoryID','PK'],['CategoryName','']]},
  { id:'ServerStatus', group:'lookup', x:170, y:120, cols:[['StatusID','PK'],['StatusName','']]},
  { id:'ServerType', group:'lookup', x:30, y:420, cols:[['ServerTypeID','PK'],['ServerType','']]},
  { id:'Domain', group:'lookup', x:30, y:510, cols:[['DomainID','PK'],['DomainName','']]},
  { id:'OSType', group:'lookup', x:30, y:600, cols:[['OSID','PK'],['OperatingSystem',''],['OSCategory','']]},
  { id:'Platform', group:'lookup', x:175, y:420, cols:[['PlatformID','PK'],['PlatformName','']]},
  { id:'Timezone', group:'lookup', x:175, y:510, cols:[['TimezoneID','PK'],['Timezone','']]},
  { id:'IPAddressType', group:'lookup', x:175, y:600, cols:[['IPAddressTypeID','PK'],['TypeName','']]},
  { id:'SQLVersion', group:'lookup', x:680, y:870, cols:[['SQLVersionID','PK'],['SQLVersionName','']]},
  { id:'SQLEdition', group:'lookup', x:820, y:870, cols:[['SQLEditionID','PK'],['SQLEditionName','']]},
  { id:'SQLInstanceType', group:'lookup', x:540, y:870, cols:[['InstanceTypeID','PK'],['InstanceTypeName','']]},
  { id:'SQLInstanceCollation', group:'lookup', x:960, y:870, cols:[['InstanceCollationID','PK'],['InstanceCollationName','']]},
];

const rels = [
  ['Server','ServerHardware'],['Server','ServerIP'],['Server','ServerStorage'],['Server','ServerContact'],
  ['Server','SQLInstance'],['Server','Environment'],['Server','BusinessUnit'],['Server','ServerCategory'],
  ['Server','Region'],['Server','ServerStatus'],
  ['SQLInstance','SQLDatabase'],['SQLInstance','SQLInstanceVersion'],['SQLInstance','SQLInstanceConfig'],
  ['SQLInstance','SQLInstanceLinkedServer'],['SQLInstance','SQLDatabaseDailySnapshot'],
  ['SQLInstance','SQLDatabaseMonthlyMax'],['SQLInstance','DatabaseBackup'],['SQLInstance','SQLMaintenanceJobRun'],
  ['SQLInstance','SQLInstanceType'],
  ['ServerHardware','Domain'],['ServerHardware','OSType'],['ServerHardware','ServerType'],
  ['ServerHardware','Platform'],['ServerHardware','Timezone'],['ServerIP','IPAddressType'],
  ['ServerContact','Contact'],['ServerContact','ContactCategory'],
  ['SQLInstanceVersion','SQLVersion'],['SQLInstanceVersion','SQLEdition'],
  ['SQLInstanceConfig','SQLInstanceCollation'],
  ['BusinessUnit','BusinessUnitContact'],['BusinessUnitContact','Contact'],['BusinessUnitContact','ContactCategory'],
];

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('lines');

const tblEls = {};
const tblData = {};

tables.forEach(t => {
  const c = COLORS[t.group];
  const el = document.createElement('div');
  el.className = 'tbl';
  el.id = 'tbl_'+t.id;
  el.style.cssText = `left:${t.x}px;top:${t.y}px;border:1px solid ${c.border};`;

  let html = `<div class="tbl-head" style="background:${c.head};color:${c.headTxt}">${t.id}</div><div class="tbl-body">`;
  t.cols.forEach((col, i) => {
    const bg = i%2===0 ? c.rowOdd : c.rowEven;
    let badge = '';
    if (col[1]==='PK') badge = `<span class="badge" style="background:${c.head};color:${c.headTxt}">PK</span>`;
    else if (col[1]==='FK') badge = `<span class="badge" style="background:${c.border}22;color:${c.head}">FK</span>`;
    html += `<div class="tbl-row" style="background:${bg};color:${c.rowTxt}">${badge}<span>${col[0]}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
  canvas.appendChild(el);
  tblEls[t.id] = el;
  tblData[t.id] = t;
});

function getCenter(id) {
  const t = tblData[id];
  const el = tblEls[id];
  const w = el.offsetWidth || 160;
  const h = el.offsetHeight || 30;
  return { x: t.x + w/2, y: t.y + h/2, x1:t.x, x2:t.x+w, y1:t.y, y2:t.y+h };
}

function drawLines() {
  svg.innerHTML = '';
  const W = 1600, H = 1500;
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  const lineColor = dark ? '#4a4840' : '#c8c6be';

  rels.forEach(([a, b]) => {
    const ca = getCenter(a), cb = getCenter(b);
    if (!ca || !cb) return;
    const x1 = ca.x, y1 = ca.y, x2 = cb.x, y2 = cb.y;
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);
    let d;
    if (dy < 30) {
      d = `M${x1} ${y1} L${x2} ${y2}`;
    } else if (dx < 30) {
      d = `M${x1} ${y1} L${x2} ${y2}`;
    } else {
      d = `M${x1} ${y1} C${x1} ${my} ${x2} ${my} ${x2} ${y2}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', lineColor);
    path.setAttribute('stroke-width','1');
    path.setAttribute('opacity','0.7');
    svg.appendChild(path);
  });
}

let scale = 0.62, tx = 0, ty = 0;
let dragging = false, lastX, lastY;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

function zoom(factor) {
  const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
  const wx = (cx - tx) / scale, wy = (cy - ty) / scale;
  scale = Math.min(2, Math.max(0.2, scale * factor));
  tx = cx - wx * scale;
  ty = cy - wy * scale;
  applyTransform();
}

function resetView() {
  scale = 0.62; tx = 0; ty = 0;
  applyTransform();
}

wrap.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, {passive:false});

wrap.addEventListener('touchstart', e => {
  if (e.touches.length===1) { dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
},{passive:true});
wrap.addEventListener('touchmove', e => {
  if (!dragging || e.touches.length!==1) return;
  tx += e.touches[0].clientX-lastX; ty += e.touches[0].clientY-lastY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  applyTransform();
},{passive:true});
wrap.addEventListener('touchend', ()=>dragging=false);

applyTransform();
setTimeout(drawLines, 100);
</script>
